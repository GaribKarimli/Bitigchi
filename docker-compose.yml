version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: bitigchi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bitigchi_db
      POSTGRES_USER: bitigchi_user
      POSTGRES_PASSWORD: BitigchiDB2024Secure!
    ports:
      - "5432:5432"
    volumes:
      - bitigchi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bitigchi_user -d bitigchi_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0
    container_name: bitigchi-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: bitigchi_admin
      MONGO_INITDB_ROOT_PASSWORD: BitigchiMongo2024Secure!
      MONGO_INITDB_DATABASE: bitigchi_social
    ports:
      - "27017:27017"
    volumes:
      - bitigchi_mongodata:/data/db

  minio:
    image: minio/minio:RELEASE.2025-03-12T18-04-18Z
    container_name: bitigchi-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - bitigchi_miniodata:/data

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: bitigchi-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
      minio:
        condition: service_started
    env_file:
      - ./apps/backend/.env
    environment:
      - DATABASE_URL=postgresql://bitigchi_user:BitigchiDB2024Secure!@postgres:5432/bitigchi_db
      - MONGO_URL=mongodb://bitigchi_admin:BitigchiMongo2024Secure!@mongodb:27017
      - MINIO_ENDPOINT=minio:9000
      - FRONTEND_URL=http://localhost:3000
      - BACKEND_URL=http://localhost:8000
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend:/app
      - /app/.venv
      - /app/__pycache__

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: bitigchi-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  bitigchi_pgdata:
    driver: local
  bitigchi_mongodata:
    driver: local
  bitigchi_miniodata:
    driver: local
